<svg width="860" height="140" viewBox="0 0 860 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0118"/>
      <stop offset="50%" stop-color="#12022a"/>
      <stop offset="100%" stop-color="#050112"/>
    </linearGradient>
    <linearGradient id="topborder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff2d78" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#ff2d78" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#00e5ff" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#ffe600" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffe600" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titlegrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00ff88"/>
      <stop offset="50%"  stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="btngrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#00ff88" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="860" height="140" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="860" height="140" fill="url(#bg)" rx="12"/>

  <g clip-path="url(#clip)">

    <!-- Star field -->
    <g fill="#ffffff">
      <circle cx="20"  cy="12"  r="1"   opacity="0.6"/>
      <circle cx="80"  cy="35"  r="0.8" opacity="0.4"/>
      <circle cx="140" cy="8"   r="1.2" opacity="0.7"/>
      <circle cx="200" cy="50"  r="0.8" opacity="0.3"/>
      <circle cx="260" cy="20"  r="1"   opacity="0.5"/>
      <circle cx="320" cy="60"  r="0.8" opacity="0.4"/>
      <circle cx="380" cy="10"  r="1"   opacity="0.6"/>
      <circle cx="440" cy="45"  r="0.8" opacity="0.3"/>
      <circle cx="500" cy="18"  r="1.2" opacity="0.5"/>
      <circle cx="560" cy="55"  r="0.8" opacity="0.4"/>
      <circle cx="620" cy="8"   r="1"   opacity="0.6"/>
      <circle cx="680" cy="38"  r="0.8" opacity="0.3"/>
      <circle cx="740" cy="15"  r="1"   opacity="0.5"/>
      <circle cx="800" cy="48"  r="0.8" opacity="0.4"/>
      <circle cx="840" cy="22"  r="1"   opacity="0.6"/>
      <circle cx="50"  cy="90"  r="0.8" opacity="0.3"/>
      <circle cx="110" cy="120" r="1"   opacity="0.4"/>
      <circle cx="170" cy="100" r="0.8" opacity="0.5"/>
      <circle cx="230" cy="130" r="1"   opacity="0.3"/>
      <circle cx="290" cy="85"  r="0.8" opacity="0.4"/>
      <circle cx="350" cy="115" r="1"   opacity="0.5"/>
      <circle cx="410" cy="95"  r="0.8" opacity="0.3"/>
      <circle cx="470" cy="125" r="1"   opacity="0.4"/>
      <circle cx="530" cy="80"  r="0.8" opacity="0.5"/>
      <circle cx="590" cy="110" r="1"   opacity="0.3"/>
      <circle cx="650" cy="90"  r="0.8" opacity="0.4"/>
      <circle cx="710" cy="120" r="1"   opacity="0.5"/>
      <circle cx="770" cy="95"  r="0.8" opacity="0.3"/>
      <circle cx="830" cy="105" r="1"   opacity="0.4"/>
    </g>

    <!-- Top + bottom glow border -->
    <rect x="0" y="0"   width="860" height="3" fill="url(#topborder)" rx="1"/>
    <rect x="0" y="137" width="860" height="3" fill="url(#topborder)" rx="1"/>

    <!-- ── LEFT: 3 pixel invaders, large ── -->
    <!-- Invader 1 — pink -->
    <g fill="#ff2d78" filter="url(#glow)">
      <rect x="22" y="28" width="6" height="6"/>
      <rect x="28" y="22" width="18" height="6"/>
      <rect x="22" y="22" width="6" height="6"/>
      <rect x="46" y="22" width="6" height="6"/>
      <rect x="16" y="28" width="30" height="6"/>
      <rect x="22" y="34" width="6" height="6"/>
      <rect x="34" y="34" width="6" height="6"/>
      <rect x="16" y="40" width="6" height="6"/>
      <rect x="40" y="40" width="6" height="6"/>
    </g>

    <!-- Invader 2 — cyan -->
    <g fill="#00e5ff" filter="url(#glow)">
      <rect x="72" y="28" width="6" height="6"/>
      <rect x="78" y="22" width="18" height="6"/>
      <rect x="72" y="22" width="6" height="6"/>
      <rect x="96" y="22" width="6" height="6"/>
      <rect x="66" y="28" width="30" height="6"/>
      <rect x="72" y="34" width="6" height="6"/>
      <rect x="84" y="34" width="6" height="6"/>
      <rect x="66" y="40" width="6" height="6"/>
      <rect x="90" y="40" width="6" height="6"/>
    </g>

    <!-- Invader 3 — yellow -->
    <g fill="#ffe600" filter="url(#glow)">
      <rect x="122" y="28" width="6" height="6"/>
      <rect x="128" y="22" width="18" height="6"/>
      <rect x="122" y="22" width="6" height="6"/>
      <rect x="146" y="22" width="6" height="6"/>
      <rect x="116" y="28" width="30" height="6"/>
      <rect x="122" y="34" width="6" height="6"/>
      <rect x="134" y="34" width="6" height="6"/>
      <rect x="116" y="40" width="6" height="6"/>
      <rect x="140" y="40" width="6" height="6"/>
    </g>

    <!-- Score labels under invaders -->
    <text x="34"  y="60" font-family="monospace" font-size="9" fill="#ff2d78"  text-anchor="middle" font-weight="bold">30pts</text>
    <text x="84"  y="60" font-family="monospace" font-size="9" fill="#00e5ff"  text-anchor="middle" font-weight="bold">20pts</text>
    <text x="134" y="60" font-family="monospace" font-size="9" fill="#ffe600"  text-anchor="middle" font-weight="bold">10pts</text>

    <!-- Divider line -->
    <rect x="168" y="20" width="1.5" height="100" fill="#ffffff" opacity="0.07" rx="1"/>

    <!-- ── CENTER: Title + description ── -->
    <text x="185" y="52"
      font-family="'Courier New', monospace"
      font-size="28"
      font-weight="900"
      fill="url(#titlegrad)"
      filter="url(#bigglow)"
      letter-spacing="3">SPACE INVADERS</text>

    <text x="185" y="76"
      font-family="monospace"
      font-size="11"
      fill="#94a3b8"
      letter-spacing="1.5">Pixel art retro game — built into Sujit's profile</text>

    <!-- Controls row -->
    <!-- Key: arrows -->
    <rect x="185" y="90" width="52" height="20" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="211" y="105" font-family="monospace" font-size="9" fill="#64748b" text-anchor="middle">← → MOVE</text>

    <rect x="244" y="90" width="58" height="20" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="273" y="105" font-family="monospace" font-size="9" fill="#64748b" text-anchor="middle">SPACE FIRE</text>

    <rect x="309" y="90" width="60" height="20" rx="4" fill="rgba(0,255,136,0.06)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
    <text x="339" y="105" font-family="monospace" font-size="9" fill="#00ff88" text-anchor="middle">📱 MOBILE ✓</text>

    <!-- ── RIGHT: Play button ── -->
    <rect x="690" y="28" width="148" height="84" rx="10"
      fill="url(#btngrad)"
      stroke="#00ff88"
      stroke-width="2"/>

    <!-- Button inner glow line -->
    <rect x="692" y="30" width="144" height="1" fill="#00ff88" opacity="0.3" rx="1"/>

    <text x="764" y="72"
      font-family="monospace"
      font-size="18"
      font-weight="bold"
      fill="#00ff88"
      text-anchor="middle"
      filter="url(#glow)"
      letter-spacing="2">▶ PLAY</text>

    <text x="764" y="95"
      font-family="monospace"
      font-size="9"
      fill="#475569"
      text-anchor="middle"
      letter-spacing="1">FREE · NO INSTALL</text>

    <!-- Pulsing ring on button -->
    <rect x="690" y="28" width="148" height="84" rx="10" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="1.5;3;1.5" dur="1.8s" repeatCount="indefinite"/>
    </rect>

    <!-- Animated bullet shooting up between invaders and text -->
    <rect x="172" y="80" width="4" height="10" rx="2" fill="#ffe600" filter="url(#glow)">
      <animate attributeName="y" values="130;5;130" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/>
    </rect>

    <!-- UFO flying across top -->
    <g filter="url(#glow)">
      <rect y="8" height="5" rx="2" fill="#ff2d78">
        <animate attributeName="x" values="-40;900" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="width" values="30;30" dur="4s" repeatCount="indefinite"/>
      </rect>
      <rect y="4" height="5" rx="3" fill="#ff2d78" opacity="0.7">
        <animate attributeName="x" values="-25;915" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="width" values="18;18" dur="4s" repeatCount="indefinite"/>
      </rect>
      <text font-family="monospace" font-size="8" fill="#ff2d78" y="8">
        <animateTransform attributeName="transform" type="translate" values="-40,0;900,0" dur="4s" repeatCount="indefinite"/>
        ?
      </text>
    </g>

  </g>
</svg>
