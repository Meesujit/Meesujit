<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="winbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c2e"/>
      <stop offset="100%" stop-color="#13131f"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a3e"/>
      <stop offset="100%" stop-color="#1e1e30"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Window shadow -->
  <rect x="6" y="6" width="668" height="368" rx="12" fill="rgba(0,0,0,0.5)"/>

  <!-- Window body -->
  <rect x="2" y="2" width="668" height="368" rx="12" fill="url(#winbg)" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="2" y="2" width="668" height="36" rx="12" fill="url(#titlebar)"/>
  <rect x="2" y="26" width="668" height="12" fill="url(#titlebar)"/>
  <rect x="2" y="32" width="668" height="6" fill="#1c1c2e"/>

  <!-- Traffic lights -->
  <circle cx="24" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="24" cy="20" r="6" fill="none" stroke="#e0443e" stroke-width="0.5"/>
  <circle cx="44" cy="20" r="6" fill="#febc2e"/>
  <circle cx="44" cy="20" r="6" fill="none" stroke="#d4a017" stroke-width="0.5"/>
  <circle cx="64" cy="20" r="6" fill="#28c840"/>
  <circle cx="64" cy="20" r="6" fill="none" stroke="#1aab29" stroke-width="0.5"/>

  <!-- Title text -->
  <text x="340" y="24" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#6b6b8a" text-anchor="middle" letter-spacing="1">sujit@dev ~ zsh</text>

  <!-- Tab -->
  <rect x="88" y="8" width="120" height="24" rx="6" fill="#1c1c2e" stroke="#3a3a5a" stroke-width="0.5"/>
  <text x="148" y="23" font-family="monospace" font-size="10" fill="#e2e8f0" text-anchor="middle">~/profile</text>

  <!-- Scanline texture -->
  <rect x="2" y="38" width="668" height="332" rx="0" fill="url(#winbg)" opacity="0.3"/>

  <!-- Line numbers bar -->
  <rect x="2" y="38" width="40" height="332" fill="rgba(0,0,0,0.15)"/>

  <!-- ── Terminal content ── -->

  <!-- Line 1: prompt + command -->
  <text x="52" y="72" font-family="'Fira Code', 'SF Mono', monospace" font-size="13">
    <tspan fill="#6272a4">❯</tspan>
    <tspan fill="#8be9fd" dx="6">cat</tspan>
    <tspan fill="#f8f8f2" dx="4">about.json</tspan>
  </text>
  <text x="14" y="72" font-family="monospace" font-size="10" fill="#3a3a5a">1</text>

  <!-- Opening brace -->
  <text x="52" y="96" font-family="'Fira Code','SF Mono',monospace" font-size="13" fill="#f8f8f2">
    <tspan fill="#f8f8f2">{</tspan>
  </text>
  <text x="14" y="96" font-family="monospace" font-size="10" fill="#3a3a5a">2</text>

  <!-- name -->
  <text x="68" y="118" font-family="'Fira Code','SF Mono',monospace" font-size="13">
    <tspan fill="#ff79c6">"name"</tspan>
    <tspan fill="#f8f8f2">:  </tspan>
    <tspan fill="#f1fa8c">"Sujit Kumar Gouda"</tspan>
    <tspan fill="#6272a4">,</tspan>
  </text>
  <text x="14" y="118" font-family="monospace" font-size="10" fill="#3a3a5a">3</text>

  <!-- role -->
  <text x="68" y="140" font-family="'Fira Code','SF Mono',monospace" font-size="13">
    <tspan fill="#ff79c6">"role"</tspan>
    <tspan fill="#f8f8f2">:  </tspan>
    <tspan fill="#f1fa8c">"Software Engineer"</tspan>
    <tspan fill="#6272a4">,</tspan>
  </text>
  <text x="14" y="140" font-family="monospace" font-size="10" fill="#3a3a5a">4</text>

  <!-- location -->
  <text x="68" y="162" font-family="'Fira Code','SF Mono',monospace" font-size="13">
    <tspan fill="#ff79c6">"at"</tspan>
    <tspan fill="#f8f8f2">:     </tspan>
    <tspan fill="#f1fa8c">"Eduplor India"</tspan>
    <tspan fill="#6272a4">,</tspan>
  </text>
  <text x="14" y="162" font-family="monospace" font-size="10" fill="#3a3a5a">5</text>

  <!-- stack -->
  <text x="68" y="184" font-family="'Fira Code','SF Mono',monospace" font-size="13">
    <tspan fill="#ff79c6">"stack"</tspan>
    <tspan fill="#f8f8f2">: </tspan>
    <tspan fill="#f8f8f2">[</tspan>
    <tspan fill="#50fa7b">"TypeScript"</tspan>
    <tspan fill="#f8f8f2">, </tspan>
    <tspan fill="#50fa7b">"Next.js"</tspan>
    <tspan fill="#f8f8f2">, </tspan>
    <tspan fill="#50fa7b">"Node.js"</tspan>
    <tspan fill="#f8f8f2">],</tspan>
  </text>
  <text x="14" y="184" font-family="monospace" font-size="10" fill="#3a3a5a">6</text>

  <!-- hustle -->
  <text x="68" y="206" font-family="'Fira Code','SF Mono',monospace" font-size="13">
    <tspan fill="#ff79c6">"hustle"</tspan>
    <tspan fill="#f8f8f2">: </tspan>
    <tspan fill="#f8f8f2">[</tspan>
    <tspan fill="#50fa7b">"Freelance"</tspan>
    <tspan fill="#f8f8f2">, </tspan>
    <tspan fill="#50fa7b">"BinarySquad"</tspan>
    <tspan fill="#f8f8f2">],</tspan>
  </text>
  <text x="14" y="206" font-family="monospace" font-size="10" fill="#3a3a5a">7</text>

  <!-- location -->
  <text x="68" y="228" font-family="'Fira Code','SF Mono',monospace" font-size="13">
    <tspan fill="#ff79c6">"location"</tspan>
    <tspan fill="#f8f8f2">: </tspan>
    <tspan fill="#f1fa8c">"Bhubaneswar, India 🇮🇳"</tspan>
    <tspan fill="#6272a4">,</tspan>
  </text>
  <text x="14" y="228" font-family="monospace" font-size="10" fill="#3a3a5a">8</text>

  <!-- openTo -->
  <text x="68" y="250" font-family="'Fira Code','SF Mono',monospace" font-size="13">
    <tspan fill="#ff79c6">"openTo"</tspan>
    <tspan fill="#f8f8f2">: </tspan>
    <tspan fill="#bd93f9">true</tspan>
    <tspan fill="#6272a4">,   </tspan>
    <tspan fill="#6272a4">// collabs &amp; interesting problems</tspan>
  </text>
  <text x="14" y="250" font-family="monospace" font-size="10" fill="#3a3a5a">9</text>

  <!-- funFact -->
  <text x="68" y="272" font-family="'Fira Code','SF Mono',monospace" font-size="13">
    <tspan fill="#ff79c6">"funFact"</tspan>
    <tspan fill="#f8f8f2">: </tspan>
    <tspan fill="#f1fa8c">"I debug at 2am and call it productivity 🌙"</tspan>
  </text>
  <text x="14" y="272" font-family="monospace" font-size="10" fill="#3a3a5a">10</text>

  <!-- closing brace -->
  <text x="52" y="294" font-family="'Fira Code','SF Mono',monospace" font-size="13" fill="#f8f8f2">}</text>
  <text x="14" y="294" font-family="monospace" font-size="10" fill="#3a3a5a">11</text>

  <!-- Next prompt line with cursor -->
  <text x="52" y="326" font-family="'Fira Code','SF Mono',monospace" font-size="13">
    <tspan fill="#6272a4">❯</tspan>
    <tspan fill="#50fa7b" dx="6">echo</tspan>
    <tspan fill="#f1fa8c" dx="4">"Let's build something great"</tspan>
  </text>
  <text x="14" y="326" font-family="monospace" font-size="10" fill="#3a3a5a">12</text>

  <text x="52" y="350" font-family="'Fira Code','SF Mono',monospace" font-size="13" fill="#50fa7b" filter="url(#textglow)">Let's build something great</text>
  <text x="14" y="350" font-family="monospace" font-size="10" fill="#3a3a5a">13</text>

  <!-- Blinking cursor -->
  <rect x="52" y="360" width="9" height="14" rx="1" fill="#f8f8f2" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0;0.85" dur="1.1s" repeatCount="indefinite"/>
  </rect>
  <text x="14" y="372" font-family="monospace" font-size="10" fill="#3a3a5a">14</text>

  <!-- Bottom status bar -->
  <rect x="2" y="358" width="668" height="12" fill="#1e1e30" rx="0"/>
  <rect x="2" y="364" width="668" height="6" rx="0" fill="#1e1e30"/>
  <rect x="2" y="358" width="668" height="12" rx="0" fill="#13131f"/>

  <!-- Status bar items -->
  <rect x="2" y="358" width="100" height="12" fill="#bd93f9"/>
  <text x="52" y="368" font-family="monospace" font-size="8" fill="#1e1e30" text-anchor="middle" font-weight="bold"> NORMAL </text>
  <text x="120" y="368" font-family="monospace" font-size="8" fill="#6272a4">about.json</text>
  <text x="580" y="368" font-family="monospace" font-size="8" fill="#6272a4">JSON  UTF-8  LF  14:1</text>
</svg>
