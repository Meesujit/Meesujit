<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#0f1f2e"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffaa"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffaa" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00ffaa" stop-opacity="1"/>
      <stop offset="75%" stop-color="#f472b6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orbGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffaa" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00ffaa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orbPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="900" height="280" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background card -->
  <rect width="900" height="280" fill="url(#bg)" rx="14"/>

  <g clip-path="url(#clip)">

    <!-- Glow orbs — much more visible -->
    <ellipse cx="80" cy="80" rx="180" ry="140" fill="url(#orbGreen)" opacity="1"/>
    <ellipse cx="820" cy="200" rx="200" ry="160" fill="url(#orbPink)" opacity="1"/>

    <!-- Dot grid -->
    <g fill="#7dd3fc" opacity="0.12">
      <circle cx="50" cy="50" r="1.2"/><circle cx="150" cy="50" r="1.2"/><circle cx="250" cy="50" r="1.2"/><circle cx="350" cy="50" r="1.2"/><circle cx="450" cy="50" r="1.2"/><circle cx="550" cy="50" r="1.2"/><circle cx="650" cy="50" r="1.2"/><circle cx="750" cy="50" r="1.2"/><circle cx="850" cy="50" r="1.2"/>
      <circle cx="50" cy="100" r="1.2"/><circle cx="150" cy="100" r="1.2"/><circle cx="250" cy="100" r="1.2"/><circle cx="350" cy="100" r="1.2"/><circle cx="450" cy="100" r="1.2"/><circle cx="550" cy="100" r="1.2"/><circle cx="650" cy="100" r="1.2"/><circle cx="750" cy="100" r="1.2"/><circle cx="850" cy="100" r="1.2"/>
      <circle cx="50" cy="150" r="1.2"/><circle cx="150" cy="150" r="1.2"/><circle cx="250" cy="150" r="1.2"/><circle cx="350" cy="150" r="1.2"/><circle cx="450" cy="150" r="1.2"/><circle cx="550" cy="150" r="1.2"/><circle cx="650" cy="150" r="1.2"/><circle cx="750" cy="150" r="1.2"/><circle cx="850" cy="150" r="1.2"/>
      <circle cx="50" cy="200" r="1.2"/><circle cx="150" cy="200" r="1.2"/><circle cx="250" cy="200" r="1.2"/><circle cx="350" cy="200" r="1.2"/><circle cx="450" cy="200" r="1.2"/><circle cx="550" cy="200" r="1.2"/><circle cx="650" cy="200" r="1.2"/><circle cx="750" cy="200" r="1.2"/><circle cx="850" cy="200" r="1.2"/>
      <circle cx="50" cy="250" r="1.2"/><circle cx="150" cy="250" r="1.2"/><circle cx="250" cy="250" r="1.2"/><circle cx="350" cy="250" r="1.2"/><circle cx="450" cy="250" r="1.2"/><circle cx="550" cy="250" r="1.2"/><circle cx="650" cy="250" r="1.2"/><circle cx="750" cy="250" r="1.2"/><circle cx="850" cy="250" r="1.2"/>
    </g>

    <!-- Corner brackets — brighter -->
    <path d="M22,50 L22,22 L50,22" fill="none" stroke="#00ffaa" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M850,22 L878,22 L878,50" fill="none" stroke="#f472b6" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M22,230 L22,258 L50,258" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M850,258 L878,258 L878,230" fill="none" stroke="#00ffaa" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

    <!-- Pulsing status dot -->
    <circle cx="50" cy="38" r="9" fill="#00ffaa" opacity="0.15">
      <animate attributeName="r" values="9;14;9" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0;0.15" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="38" r="5" fill="#00ffaa"/>
    <text x="64" y="43" font-family="monospace" font-size="11" fill="#00ffaa" letter-spacing="2" font-weight="bold">AVAILABLE FOR WORK</text>

    <!-- Big name — with glow -->
    <text x="450" y="120"
      font-family="Arial Black, Arial, sans-serif"
      font-size="68"
      font-weight="900"
      text-anchor="middle"
      fill="url(#nameGrad)"
      filter="url(#glow)"
      letter-spacing="2">SUJIT GOUDA</text>

    <!-- Gradient divider line -->
    <rect x="120" y="132" width="660" height="2.5" fill="url(#lineGrad)" rx="2">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Role — white, high contrast -->
    <text x="450" y="163"
      font-family="monospace"
      font-size="14"
      fill="#e2e8f0"
      text-anchor="middle"
      letter-spacing="4">SOFTWARE ENGINEER  ·  TYPESCRIPT  ·  NEXT.JS</text>

    <!-- Pills row — brighter fills and borders -->
    <rect x="170" y="182" width="128" height="28" rx="14" fill="#00ffaa" fill-opacity="0.15" stroke="#00ffaa" stroke-width="1.2"/>
    <text x="234" y="201" font-family="monospace" font-size="12" fill="#00ffaa" text-anchor="middle" font-weight="bold">⚡ Eduplor India</text>

    <rect x="312" y="182" width="124" height="28" rx="14" fill="#38bdf8" fill-opacity="0.15" stroke="#38bdf8" stroke-width="1.2"/>
    <text x="374" y="201" font-family="monospace" font-size="12" fill="#7dd3fc" text-anchor="middle" font-weight="bold">🚀 BinarySquad</text>

    <rect x="450" y="182" width="116" height="28" rx="14" fill="#f472b6" fill-opacity="0.15" stroke="#f472b6" stroke-width="1.2"/>
    <text x="508" y="201" font-family="monospace" font-size="12" fill="#f9a8d4" text-anchor="middle" font-weight="bold">🎓 MCA · B.Sc</text>

    <rect x="580" y="182" width="148" height="28" rx="14" fill="#ffffff" fill-opacity="0.07" stroke="#94a3b8" stroke-width="1"/>
    <text x="654" y="201" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">📍 Bhubaneswar, IN</text>

    <!-- Bottom caption — visible now -->
    <text x="450" y="252"
      font-family="monospace"
      font-size="11"
      fill="#64748b"
      text-anchor="middle"
      letter-spacing="3">// building in public · shipping every week</text>

    <!-- Blinking cursor -->
    <rect x="675" y="240" width="8" height="13" rx="1" fill="#00ffaa">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>

  </g>
</svg>
