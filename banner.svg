<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020917"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffaa"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffaa" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00ffaa" stop-opacity="1"/>
      <stop offset="70%" stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="orb" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <clipPath id="clip">
      <rect width="900" height="280" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)" rx="12"/>

  <!-- Clipped content -->
  <g clip-path="url(#clip)">

    <!-- Ambient glow orbs (static, no CSS needed) -->
    <circle cx="100" cy="70" r="100" fill="#00ffaa" opacity="0.05" filter="url(#orb)"/>
    <circle cx="800" cy="210" r="120" fill="#f472b6" opacity="0.06" filter="url(#orb)"/>
    <circle cx="450" cy="140" r="150" fill="#00d4ff" opacity="0.03" filter="url(#orb)"/>

    <!-- Grid dots pattern -->
    <g fill="#00ffaa" opacity="0.07">
      <circle cx="50" cy="50" r="1"/><circle cx="150" cy="50" r="1"/><circle cx="250" cy="50" r="1"/><circle cx="350" cy="50" r="1"/><circle cx="450" cy="50" r="1"/><circle cx="550" cy="50" r="1"/><circle cx="650" cy="50" r="1"/><circle cx="750" cy="50" r="1"/><circle cx="850" cy="50" r="1"/>
      <circle cx="50" cy="100" r="1"/><circle cx="150" cy="100" r="1"/><circle cx="250" cy="100" r="1"/><circle cx="350" cy="100" r="1"/><circle cx="450" cy="100" r="1"/><circle cx="550" cy="100" r="1"/><circle cx="650" cy="100" r="1"/><circle cx="750" cy="100" r="1"/><circle cx="850" cy="100" r="1"/>
      <circle cx="50" cy="150" r="1"/><circle cx="150" cy="150" r="1"/><circle cx="250" cy="150" r="1"/><circle cx="350" cy="150" r="1"/><circle cx="450" cy="150" r="1"/><circle cx="550" cy="150" r="1"/><circle cx="650" cy="150" r="1"/><circle cx="750" cy="150" r="1"/><circle cx="850" cy="150" r="1"/>
      <circle cx="50" cy="200" r="1"/><circle cx="150" cy="200" r="1"/><circle cx="250" cy="200" r="1"/><circle cx="350" cy="200" r="1"/><circle cx="450" cy="200" r="1"/><circle cx="550" cy="200" r="1"/><circle cx="650" cy="200" r="1"/><circle cx="750" cy="200" r="1"/><circle cx="850" cy="200" r="1"/>
      <circle cx="50" cy="250" r="1"/><circle cx="150" cy="250" r="1"/><circle cx="250" cy="250" r="1"/><circle cx="350" cy="250" r="1"/><circle cx="450" cy="250" r="1"/><circle cx="550" cy="250" r="1"/><circle cx="650" cy="250" r="1"/><circle cx="750" cy="250" r="1"/><circle cx="850" cy="250" r="1"/>
    </g>

    <!-- Corner brackets -->
    <path d="M20,45 L20,20 L45,20" fill="none" stroke="#00ffaa" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <path d="M855,20 L880,20 L880,45" fill="none" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <path d="M20,235 L20,260 L45,260" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <path d="M855,260 L880,260 L880,235" fill="none" stroke="#00ffaa" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

    <!-- Status indicator -->
    <circle cx="48" cy="38" r="5" fill="#00ffaa" opacity="0.3">
      <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="48" cy="38" r="4" fill="#00ffaa"/>
    <text x="60" y="43" font-family="monospace" font-size="10" fill="#00ffaa" letter-spacing="2">AVAILABLE FOR WORK</text>

    <!-- Main name with gradient -->
    <text x="450" y="118"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="64"
      font-weight="900"
      text-anchor="middle"
      fill="url(#nameGrad)"
      filter="url(#glow)"
      letter-spacing="-1">SUJIT GOUDA</text>

    <!-- Animated underline -->
    <rect x="150" y="128" width="600" height="2" fill="url(#lineGrad)" rx="1">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </rect>

    <!-- Role subtitle -->
    <text x="450" y="160"
      font-family="monospace"
      font-size="13"
      fill="#94a3b8"
      text-anchor="middle"
      letter-spacing="4">SOFTWARE ENGINEER  ·  TYPESCRIPT  ·  NEXT.JS</text>

    <!-- Tag pills -->
    <!-- Tag 1: Eduplor -->
    <rect x="195" y="178" width="118" height="26" rx="13" fill="#00ffaa" fill-opacity="0.08" stroke="#00ffaa" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="254" y="196" font-family="monospace" font-size="11" fill="#00ffaa" text-anchor="middle">⚡ Eduplor India</text>

    <!-- Tag 2: BinarySquad -->
    <rect x="325" y="178" width="118" height="26" rx="13" fill="#00d4ff" fill-opacity="0.08" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="384" y="196" font-family="monospace" font-size="11" fill="#00d4ff" text-anchor="middle">🚀 BinarySquad</text>

    <!-- Tag 3: Education -->
    <rect x="455" y="178" width="110" height="26" rx="13" fill="#f472b6" fill-opacity="0.08" stroke="#f472b6" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="510" y="196" font-family="monospace" font-size="11" fill="#f472b6" text-anchor="middle">🎓 MCA · B.Sc</text>

    <!-- Tag 4: Location -->
    <rect x="577" y="178" width="130" height="26" rx="13" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.1"/>
    <text x="642" y="196" font-family="monospace" font-size="11" fill="#64748b" text-anchor="middle">📍 Bhubaneswar, IN</text>

    <!-- Bottom text -->
    <text x="450" y="248" font-family="monospace" font-size="10" fill="#334155" text-anchor="middle" letter-spacing="3">// building in public · shipping every week</text>

    <!-- Blinking cursor -->
    <rect x="668" y="237" width="7" height="12" rx="1" fill="#00ffaa">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>

  </g>
</svg>
